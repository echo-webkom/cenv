name: 💚 CI

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    ci:
        name: 💚 CI
        runs-on: ubuntu-latest

        steps:
            - name: 🔍 Checkout
              uses: actions/checkout@v6

            - name: 📦 Setup Rust
              uses: dtolnay/rust-toolchain@stable

            - name: 📁 Cache
              uses: Swatinem/rust-cache@v2

            - name: 🔨 Build
              run: cargo build

            - name: 🧪 Test
              run: cargo test

            - name: 📎 Clippy
              run: cargo clippy -- -D warnings

            - name: 📝 Format check
              run: cargo fmt -- --check

            - name: 🐹 Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.25"

            - name: 🧪 Go Test
              run: go test ./...

